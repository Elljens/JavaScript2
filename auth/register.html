<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loopin - register</title>
    <link href="../css/style.css" rel="stylesheet">
    <link href="../css/forms.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght,GRAD@0,17..18,400..700,-3;1,17..18,400..700,-3&family=Story+Script&display=swap" rel="stylesheet">
<script src="https://kit.fontawesome.com/ec3d7ec6ab.js" crossorigin="anonymous"></script>
    <script type="module" src="./register.js"></script>
</head>
<body>
    <header>
        <div class="logo-header">
            <h1>Loopin'<br>
            - staying in the loop</h1>
            </div>
            <nav>
                    <a href="../index.html"><i class="fa-solid fa-house"></i> Home</a>
            </nav>
    </header>
    <div id="register-page">
        <h1>Create an account</h1>
        <form id="register-form">
        <label for="name">Name*</label>
        <input id="name" name="name">
        <label for="email">Email*</label>
        <input id="email" name="email" type="email">
        <label for="password">Password*</label>
        <input id="password" name="password" type="password">
        <label for="bio">Bio</label>
        <textarea id="bio" name="bio" class="formfields"></textarea>
        <label for="avatar-url">Avatar URL</label>
        <textarea id="avatar-url" name="avatar-url" class="formfields"></textarea>
        <label for="avatar-alt">Avatar ALT</label>
        <textarea id="avatar-alt" name="avatar-alt" class="formfields"></textarea>
        <label for="banner-url">Banner URL</label>
        <textarea id="banner-url" name="banner-url" class="formfields"></textarea>
        <label for="banner-alt">Banner ALT</label>
        <textarea id="banner-alt" name="banner-alt" class="formfields"></textarea>
        <button id="submit">Submit</button>
    </form>
    <p class=success-msg>Registration completed!<br>Please log on to your account <a href="./login.html" class="redirect-link">here</a></p>
    </div>
    
</body>
</html>
